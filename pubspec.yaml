name: juspay_pp_app
description: Juspay HyperCheckout SDK Integration Testing App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  hypersdkflutter: ^4.0.27
  http: ^1.2.0
  intl: ^0.19.0
  webview_flutter: ^4.4.2
  hyper_webview_flutter: ^0.0.5
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/jusimg.png

# at the very bottom of pubspec.yaml
flutter_native_splash:
  color: "#ffffff"
  image: assets/jusimg.png
  android: true
  ios: true
